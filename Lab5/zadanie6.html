<body>
    <script>
        function dec_to_hex(n) {
            if (n === 0) return "0";

            const hexDigits = "0123456789abcdef";
            let result = "";
            let num = Math.abs(n);

            while (num > 0) {
                let remainder = num % 16;
                result = hexDigits[remainder] + result;
                num = Math.floor(num / 16);
            }

            return n < 0 ? "-" + result : result;

        }
        console.log(dec_to_hex(18))
    </script>
</body>
